<style>
    .view,
.edit {
  height: 150px;
  width: 400px;
  font-family: sans-serif;
  font-size: 14px;
  display: block;
}

.view {
  /* padding + border = 3px */
  padding: 2px;
  border: 1px solid black;
}

.edit {
  /* replace padding with border (still 3px not to shift the contents) */
  border: 3px solid blue;
  padding: 0px;
}

.edit:focus {
  /* remove focus border in Safari */
  outline: none;
}
.highlight{
    border: 1px solid red;
}
</style>
<!--
Editable div
importance: 5
Create a <div> that turns into <textarea> when clicked.

The textarea allows to edit the HTML in the <div>.

When the user presses Enter or it loses focus, the <textarea> turns back into <div>, and its content becomes HTML in <div>.


-->
<body>

  <ul>
    <li>Click the div to edit.</li>
    <li>Enter or blur saves the result.</li>
  </ul>

  HTML is allowed.

  <div id="view" class="view" tabindex="1">Text</div>

  <script>
    // ...your code...
    // Note: <textarea> should have class="edit"
    // my.css has styles to make it the same size as div
    function handleClick(){
        let eleText = view.textContent;
        view.outerHTML = `<textarea class = "edit" ></textarea>`;
        let textAreaEle = document.querySelector(".edit");
        textAreaEle.value = eleText;
        textAreaEle.focus();

        textAreaEle.onkeydown = function(event){
          if(event.key == "Enter"){
            this.blur();
          }
        }

        textAreaEle.onblur = function(){
          let newText = textAreaEle.value;
          textAreaEle.outerHTML = `<div id="view" class="view" tabindex="1"></div>`;
          let divEle = document.querySelector("#view");
          divEle.textContent = newText;

          //reattach event again on click
          divEle.onclick = handleClick;
        }

    }
view.onclick = handleClick;

  </script>

</body>
