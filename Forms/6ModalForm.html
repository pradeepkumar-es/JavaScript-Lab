<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
      }

      #button:hover {
        background-color: white;
        cursor: pointer;
      }
      #prompt-form {
        display: inline-block;
        padding: 5px 5px 5px 70px;
        width: 200px;
        border: 1px solid black;
        background: white url(https://en.js.cx/clipart/prompt.png) no-repeat
          left 5px;
        vertical-align: middle;
      }

      #prompt-form-container {
        display: none; /*by default keep it hide*/
        background-color: rgba(
          0,
          0,
          0,
          0.4
        ); /*make it 40% transparent with black baclground*/
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        width: 100%;
        height: 100%;
        text-align: center;
      }

      #prompt-form-container:before {
        display: inline-block;
        height: 100%;
        content: '';
        vertical-align: middle;
      }

      #prompt-form input[name='text'] {
        display: block;
        margin: 5px;
        width: 180px;
      }
    </style>
    <!--
      Modal form
importance: 5
Create a function showPrompt(html, callback) that shows a form with the message html, an input field and buttons OK/CANCEL.

A user should type something into a text field and press Enter or the OK button, then callback(value) is called with the value they entered.
Otherwise if the user presses Esc or CANCEL, then callback(null) is called.
In both cases that ends the input process and removes the form.

Requirements:

The form should be in the center of the window.
The form is modal. In other words, no interaction with the rest of the page is possible until the user closes it.
When the form is shown, the focus should be inside the <input> for the user.
Keys Tab/Shift+Tab should shift the focus between form fields, don’t allow it to leave for other page elements.
Usage example:

showPrompt("Enter something<br>...smart :)", function(value) {
  alert(value);
});
A demo in the iframe:


P.S. The source document has HTML/CSS for the form with fixed positioning, but it’s up to you to make it modal.


    -->
  </head>

  <body>
    <h1>click The button below</h1>
    <button id="button">click to show the form</button>
    <div id="prompt-form-container">
      <form id="prompt-form" onsubmit="return false">
        <div id="prompt-message">Enter something... <br />Please..</div>
        <input name="text" type="text" />
        <input name="submit" type="submit" value="Ok" />
        <input type="button" name="cancel" value="Cancel" />
      </form>
    </div>
    <script>
      let modal = document.getElementById('prompt-form-container');
      let modalContent = document.getElementById('prompt-form');
      let cancelBtn = document.getElementsByName('cancel')[0];
      let inputField = document.getElementsByName('text')[0];
      let submitBtn = document.getElementsByName('submit')[0];
      console.log(inputField);
      button.onclick = function (event) {
        modal.style.display = 'block';
        // inputField.tabIndex = 0; //user can focus using tab only
        inputField.focus(); // it will move cursor in input , input get activated
      };
      inputField.onchange = function (event) {
        // alert(inputField.value);
        submitBtn.onclick = function () {
          if (inputField.value) {
            showPrompt(inputField.value);
          }
        };
      };
      window.onkeydown = function (e) {
        if (e.key == 'Enter') {
          if (inputField.value) {
            showPrompt(inputField.value);
          }
        }
      };
      window.onclick = function (event) {
        if (event.target == cancelBtn) {
          modal.style.display = 'none';
          showPrompt(null);
        }
      };
      window.onkeydown = function (event) {
        if (event.key == 'Escape') {
          modal.style.display = 'none';
          showPrompt(null);
        }
      };

      function showPrompt(value) { //showing message during processing form or cancellling
        alert('You Entered: ' + value);
      }

      //for loop focus in modalContent for Tab (forwarding focusing); //next part have combined this with tab as well as shift + tab
      // cancelBtn.onkeydown = function (e) {
      //   if (e.key == 'Tab') {
      //     inputField.focus();
      //     return false;
      //   }
      // };

      //for loop focus in modalContent
      let focusable = document.querySelectorAll('input');
      console.log(focusable);

      modalContent.onkeydown = function (e) {
        if (e.key !== 'Tab') return;

        let first = focusable[0];
        let last = focusable[focusable.length - 1];

        //on modal open focus will be on first ele, on shift + tab , focus will go out of modal by default browser, so we want to shift to last and disable browser default behaviour
        if (e.shiftKey) {
          if (document.activeElement == first) {
            last.focus();
            e.preventDefault();
          }
        } else {
          //for Tab (forwarding focus)
          if (document.activeElement == last) {
            first.focus();
            e.preventDefault();
          }
        }
      };
    </script>
  </body>
</html>
