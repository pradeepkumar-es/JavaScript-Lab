<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!--
    Create a list
importance: 4
Write an interface to create a list from user input.

For every list item:

Ask a user about its content using prompt.
Create the <li> with it and add it to <ul>.
Continue until the user cancels the input (by pressing Esc or via an empty entry).
All elements should be created dynamically.

If a user types HTML-tags, they should be treated like a text.
    -->
    <script>
      let ulEle = document.createElement("ul");
      document.body.append(ulEle);
      let input;
      function inputContent() {
        input = prompt("Enter your content");
        return input;
      }
      inputContent();
      while (input) {
        let newEle = document.createElement("li");
        newEle.textContent = input;
        ulEle.append(newEle);
        inputContent();
      }
    </script>
  </body>
</html>
