    -->
<a name="list">the list</a>
<ul>
  <li><a href="http://google.com">http://google.com</a></li>
  <li><a href="/tutorial">/tutorial.html</a></li>
  <li><a href="local/path">local/path</a></li>
  <li><a href="ftp://ftp.com/my.zip">ftp://ftp.com/my.zip</a></li>
  <li><a href="http://nodejs.org">http://nodejs.org</a></li>
  <li><a href="http://internal.com/test">http://internal.com/test</a></li>
</ul>

<script>
  // setting style for a single link
  let links = document.querySelectorAll('a');
  // let url = link.getAttribute('href');
  console.log(links)
  for(let url of links){
    console.log(url.hasAttribute('href'))
    // console.log(url.href.indexOf('://')); //here .href will give full url wether url is rlative or full so use .getAttribute('href') for original url
      if(url.hasAttribute('href') && url.getAttribute('href').indexOf('://') != -1 && url.getAttribute('href').indexOf("http://internal.com")!=0){
         url.style.color = 'orange';
      }
  }
</script>
</body>
