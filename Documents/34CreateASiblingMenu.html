<!--
Create a sliding menu
importance: 5
Create a menu that opens/collapses on click:
P.S. HTML/CSS of the source document is to be modified.
-->
<style>
    .menu .title{
        cursor: pointer;
    }
    .menu ul{
        display: none;
    }
.menu .title::before{
    content: "▶";
    color:rgb(0,128,0);
}

.menu.open .title::before{
    content: "▼";
    color:rgb(0,128,0);
}
.menu.open  ul{
    display: block;
}
</style>
<body>
    <div class="menu">
         <!--for js sol only-->
        <!-- <span class="title">▶Sweeties (click me)!</span> -->

        <!-- for js and css sol both -->
        <span class="title">Sweeties (click me)!</span>
        <ul>
            <li>Cake</li>
            <li>Donut</li>
            <li>Honey</li>
        </ul>
    </div>
    <script>

        //using javascript only

        //using js and css
