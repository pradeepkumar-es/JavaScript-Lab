<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
  <style>
    .carousel{
      position: relative;
      width: 400px;
      background-color: #b1b1b1;
      border: 1px solid black;
      margin: auto;
      height: 130px;
      padding: 10px 40px;
      border-radius: 10px;
    }
    .gallery{
      position: absolute;
      width: 390px; /*only 3 image length (3*130)px visible*/
      overflow: hidden; /*only allow fixed width visible*/
    }
  .arrow {
  padding: 0;
  background: #ddd;
  border-radius: 15px;
  border: 1px solid gray;
  font-size: 24px;
  line-height: 24px;
  color: #444;
  display: block;
  position: absolute;
  top: 60px;
}

.prev{
  left: 7px;
}
.next{
  right: 7px;
}
.arrow:focus {
  outline: none;
}

.arrow:hover {
  background: #ccc;
  cursor: pointer;
}

ul {
  height: 130px;
  width: 9999px;
  margin: 0;
  padding: 0;
  list-style: none;
  font-size: 0;
  transition: margin-left 250ms;
}

ul img {
  width: 130px;
  height: 130px;
  display: block; /* removes extra space near images */
}

ul li {
  display: inline-block; /* removes extra space between list items*/
}
  </style>
</head>

<body>
<!--
    Carousel
importance: 4
Create a “carousel” – a ribbon of images that can be scrolled by clicking on arrows.


Later we can add more features to it: infinite scrolling, dynamic loading etc.

P.S. For this task HTML/CSS structure is actually 90% of the solution.
-->
  <!-- create your markup and styles -->

<div class="carousel" id="carousel">
    <button class="arrow prev">⇦</button>
  <div class="gallery">
  <ul>
    <li><img src="https://en.js.cx/carousel/1.png"></li>
    <li><img src="https://en.js.cx/carousel/2.png"></li>
    <li><img src="https://en.js.cx/carousel/3.png"></li>
    <li><img src="https://en.js.cx/carousel/4.png"></li>
    <li><img src="https://en.js.cx/carousel/5.png"></li>
    <li><img src="https://en.js.cx/carousel/6.png"></li>
    <li><img src="https://en.js.cx/carousel/7.png"></li>
    <li><img src="https://en.js.cx/carousel/8.png"></li>
    <li><img src="https://en.js.cx/carousel/9.png"></li>
    <li><img src="https://en.js.cx/carousel/10.png"></li>
  </ul>
  </div>
  <button class="arrow next">⇨</button>
</div>
  <script>
    // label the images to visually track them, just for convenience,
    // this code can be removed
    // let i = 1;
    // for(let li of carousel.querySelectorAll('li')) {
    //   li.style.position = 'relative';
    //   li.insertAdjacentHTML('beforeend', `<span style="position:absolute;left:0;top:0">${i}</span>`);
    //   i++;
    // }

    // ...your code to make carousel alive!
    let imgWidth = 130; //width of single image
    let count = 3; //number of image to show
    let liEles  = document.querySelectorAll('li');
    let ulEle = document.querySelector('ul');
    let position = 0;

    document.querySelector('.prev').addEventListener('click', function(event){
      position += imgWidth*count; //increase of marginLeft from -ve marginleft to +ive to scroll right but till 0, so that 1st image don't get hide when images from left finishes
      position = Math.min(position, 0);
      ulEle.style.marginLeft = position+"px";
    })

    document.querySelector('.next').addEventListener('click', function(event){
      position -= imgWidth*count; // decrease marginLeft in -Ve from so that ul can move in left side but till (ul total length- 3img shown length) to keep last 3 img in display 
      position = Math.max(position, -imgWidth*(liEles.length - count));
      ulEle.style.marginLeft = position + "px";
    })
  </script>

</body>
</html>
